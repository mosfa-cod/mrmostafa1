<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>تفاصيل المادة · منصة مستر مصطفى</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --p:#7C3AED;--p2:#5B21B6;--p3:#EDE9FE;
  --gold:#F59E0B;--teal:#10B981;--rose:#F43F5E;
  --bg:#F8F7FF;--card:#FFFFFF;--card2:#F3F4F6;
  --text:#1F2937;--text2:#6B7280;--text3:#9CA3AF;
  --border:rgba(0,0,0,.08);--shadow:0 4px 24px rgba(124,58,237,.10);
  --shadow2:0 2px 10px rgba(0,0,0,.06);--r:14px;--r2:20px;--tr:.3s;
}
[data-mode=dark]{
  --bg:#0F0A1E;--card:#1E1540;--card2:#251B4E;
  --text:#F1F0FF;--text2:#C4B5FD;--text3:#7C6FCD;
  --border:rgba(255,255,255,.07);--shadow:0 4px 24px rgba(124,58,237,.3);
  --shadow2:0 2px 10px rgba(0,0,0,.4);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);
  transition:background var(--tr),color var(--tr);}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.88);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
[data-mode=dark] .nav{background:rgba(15,10,30,.88);}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-logo{width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--p),var(--p2));
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.nav-title{font-size:15px;font-weight:800;color:var(--p);}
.nav-right{display:flex;gap:8px;align-items:center;}
.ctrl-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:15px;color:var(--text);transition:all .2s;}
.ctrl-btn:hover{border-color:var(--p);background:var(--p3);}
.back-btn{padding:7px 16px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .2s;}
.back-btn:hover{border-color:var(--p);color:var(--p);}

/* LIVE BANNER */
.live-banner{margin:12px 24px 0;padding:12px 16px;border-radius:16px;
  background:linear-gradient(135deg,rgba(244,63,94,.15),rgba(124,58,237,.12));
  border:1.5px solid rgba(244,63,94,.35);display:none;animation:banIn .4s;}
.live-banner.show{display:block;}
@keyframes banIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.live-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#F43F5E;
  animation:dotPulse 1.1s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);}}
.live-lbl{font-size:10px;font-weight:900;color:var(--rose);letter-spacing:.5px;}
.live-title-txt{font-size:14px;font-weight:800;color:var(--text);}
.live-join{display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--rose),#BE123C);color:#fff;
  font-size:13px;font-weight:900;font-family:inherit;margin-top:8px;
  box-shadow:0 4px 14px rgba(244,63,94,.3);transition:all .2s;}
.live-join:hover{transform:translateY(-2px);}

/* ANN BANNER */
.ann-wrap{margin:10px 24px 0;display:flex;flex-direction:column;gap:8px;}
.ann-item{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:8px;animation:banIn .4s;}
.ann-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#2563EB;}
.ann-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#059669;}
.ann-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#D97706;}

/* HERO */
.subj-hero{padding:36px 24px 28px;max-width:1000px;margin:0 auto;}
.breadcrumb{font-size:12px;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.breadcrumb a{color:var(--p);cursor:pointer;text-decoration:none;}
.subj-hero-inner{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.subj-big-icon{width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,var(--p3),var(--bg));
  display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0;
  border:1px solid var(--border);box-shadow:var(--shadow2);}
.subj-hero-info{flex:1;min-width:200px;}
.subj-hero-title{font-size:clamp(20px,4vw,32px);font-weight:900;margin-bottom:6px;}
.subj-hero-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.subj-hero-meta{display:flex;gap:12px;flex-wrap:wrap;}
.meta-chip{display:flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:10px;background:var(--card);border:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text2);box-shadow:var(--shadow2);}
.teacher-chip{background:var(--p3);border-color:var(--p3);color:var(--p);}

/* CONTENT TABS */
.content-area{max-width:1000px;margin:0 auto;padding:0 24px 48px;}
.content-tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0;}
.ctab{padding:10px 20px;border-radius:10px 10px 0 0;border:none;background:transparent;
  color:var(--text2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.ctab.active{color:var(--p);border-bottom-color:var(--p);background:var(--p3);}
.ctab:hover:not(.active){color:var(--text);background:var(--card2);}

.cpanel{display:none;animation:fadeIn .3s;}
.cpanel.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* LESSON CARDS */
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.lesson-card{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);
  padding:20px;box-shadow:var(--shadow2);cursor:pointer;transition:all var(--tr);position:relative;}
.lesson-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--p);}
.lcard-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.lcard-icon{width:46px;height:46px;border-radius:14px;background:var(--p3);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.lcard-type{position:absolute;top:14px;left:14px;padding:3px 8px;border-radius:7px;
  font-size:10px;font-weight:800;background:var(--p3);color:var(--p);}
.lcard-title{font-size:14px;font-weight:800;margin-bottom:4px;}
.lcard-desc{font-size:12px;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lcard-video{margin-top:10px;}
.lcard-video a{display:flex;align-items:center;gap:6px;padding:8px 14px;
  border-radius:10px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);
  color:var(--rose);font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;}
.lcard-video a:hover{background:var(--rose);color:#fff;}

/* QUIZ CARDS */
.quiz-card{background:var(--card);border-radius:var(--r2);border:1px solid var(--border);
  padding:22px;box-shadow:var(--shadow2);margin-bottom:16px;cursor:pointer;transition:all .2s;}
.quiz-card:hover{border-color:var(--p);box-shadow:var(--shadow);}
.quiz-card-title{font-size:15px;font-weight:800;margin-bottom:6px;}
.quiz-card-meta{font-size:12px;color:var(--text2);}
.start-quiz-btn{margin-top:14px;padding:9px 22px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;}
.start-quiz-btn:hover{transform:translateY(-2px);}

/* QUIZ MODAL */
.quiz-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;padding:20px;}
.quiz-modal.show{display:flex;}
.quiz-box{width:100%;max-width:520px;background:var(--card);border-radius:var(--r2);
  padding:28px;max-height:85vh;overflow-y:auto;animation:popIn .35s;}
@keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.quiz-q-num{font-size:11px;color:var(--text3);font-weight:800;margin-bottom:8px;}
.quiz-q-txt{font-size:17px;font-weight:800;margin-bottom:18px;line-height:1.4;}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qc{padding:12px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;text-align:center;}
.qc:hover:not(.answered){border-color:var(--p);background:var(--p3);}
.qc.correct{background:rgba(16,185,129,.15);border-color:var(--teal);color:var(--teal);}
.qc.wrong{background:rgba(244,63,94,.12);border-color:var(--rose);color:var(--rose);}
.qc.answered{pointer-events:none;}
.quiz-feedback{text-align:center;font-size:14px;font-weight:800;margin-top:14px;min-height:20px;}
.quiz-progress{height:5px;border-radius:3px;background:var(--border);margin-bottom:20px;overflow:hidden;}
.quiz-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p),var(--teal));transition:width .4s;}
.quiz-result{text-align:center;padding:20px 0;}
.quiz-result-icon{font-size:64px;margin-bottom:12px;}
.quiz-result-title{font-size:22px;font-weight:900;color:var(--p);margin-bottom:6px;}
.quiz-result-score{font-size:16px;color:var(--text2);margin-bottom:20px;}
.quiz-close{padding:11px 28px;border-radius:12px;border:none;background:var(--p);color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-text{font-size:15px;font-weight:700;}
.empty-sub{font-size:13px;margin-top:6px;}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--card2) 25%,var(--bg) 50%,var(--card2) 75%);
  background-size:200% 100%;animation:skelA 1.4s infinite;border-radius:var(--r2);}
@keyframes skelA{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--p);color:#fff;padding:12px 24px;border-radius:14px;
  font-size:13px;font-weight:700;z-index:9999;transition:transform .38s;
  box-shadow:0 8px 28px rgba(0,0,0,.3);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .subj-hero{padding:20px 16px;}
  .content-area{padding:0 16px 40px;}
  .quiz-choices{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand" onclick="location.href='index_academy.html'">
    <div class="nav-logo">🎓</div>
    <div class="nav-title">منصة مستر مصطفى</div>
  </div>
  <div class="nav-right">
    <div class="ctrl-btn" onclick="toggleMode()" id="modeBtn">🌙</div>
    <button class="back-btn" onclick="location.href='index_academy.html'">← رجوع</button>
  </div>
</nav>

<!-- LIVE BANNER -->
<div class="live-banner" id="liveBanner">
  <div class="live-row">
    <span class="live-dot"></span>
    <span class="live-lbl">بثّ مباشر الآن</span>
    <span id="livePlatIcon">🔴</span>
  </div>
  <div class="live-title-txt" id="liveTitleTxt">عنوان البث</div>
  <button class="live-join" onclick="joinLive()">📲 اضغط هنا للانضمام إلى البث المباشر</button>
</div>

<!-- ANNOUNCEMENTS -->
<div class="ann-wrap" id="annWrap"></div>

<!-- SUBJECT HERO -->
<div class="subj-hero">
  <div class="breadcrumb">
    <a onclick="location.href='index_academy.html'">الرئيسية</a>
    <span>›</span>
    <span id="breadSubj">المادة</span>
  </div>
  <div class="subj-hero-inner">
    <div class="subj-big-icon" id="subjBigIcon">📚</div>
    <div class="subj-hero-info">
      <div class="subj-hero-title" id="subjHeroTitle">جارٍ التحميل...</div>
      <div class="subj-hero-desc" id="subjHeroDesc"></div>
      <div class="subj-hero-meta" id="subjHeroMeta"></div>
    </div>
  </div>
</div>

<!-- CONTENT TABS -->
<div class="content-area">
  <div class="content-tabs">
    <button class="ctab active" id="ct0" onclick="showTab(0)">📖 الدروس</button>
    <button class="ctab" id="ct1" onclick="showTab(1)">🎬 الفيديوهات</button>
    <button class="ctab" id="ct2" onclick="showTab(2)">📕 القصص</button>
    <button class="ctab" id="ct3" onclick="showTab(3)">❓ الاختبارات</button>
  </div>

  <!-- Lessons -->
  <div class="cpanel show" id="cp0">
    <div class="lessons-grid" id="lessonsGrid">
      <div class="skel" style="height:160px;"></div>
      <div class="skel" style="height:160px;"></div>
      <div class="skel" style="height:160px;"></div>
    </div>
  </div>

  <!-- Videos -->
  <div class="cpanel" id="cp1">
    <div class="lessons-grid" id="videosGrid">
      <div class="empty"><div class="empty-icon">🎬</div><div class="empty-text">جارٍ التحميل</div></div>
    </div>
  </div>

  <!-- Stories -->
  <div class="cpanel" id="cp2">
    <div class="lessons-grid" id="storiesGrid">
      <div class="empty"><div class="empty-icon">📕</div><div class="empty-text">جارٍ التحميل</div></div>
    </div>
  </div>

  <!-- Quizzes -->
  <div class="cpanel" id="cp3">
    <div id="quizList">
      <div class="empty"><div class="empty-icon">❓</div><div class="empty-text">جارٍ التحميل</div></div>
    </div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="quiz-modal" id="quizModal">
  <div class="quiz-box" id="quizBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, where }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBMvIzV131KdAjuHS8B6tCUBsmaGgloLUY",
  authDomain:"mostafa-acdemy-2645a.firebaseapp.com",
  projectId:"mostafa-acdemy-2645a",
  storageBucket:"mostafa-acdemy-2645a.firebasestorage.app",
  messagingSenderId:"371101699494",
  appId:"1:371101699494:web:3e79c870941afef5179367"
});
const db = getFirestore(app);

/* ── Utils ── */
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const params = new URLSearchParams(location.search);
const subjectId = params.get('id');
let liveLink='';
let currentQuiz=null, quizIdx=0, quizScore=0;

/* ── Theme ── */
const root=document.documentElement;
if(localStorage.getItem('mode')) root.setAttribute('data-mode',localStorage.getItem('mode'));
document.getElementById('modeBtn').textContent=root.getAttribute('data-mode')==='dark'?'☀️':'🌙';
window.toggleMode=function(){
  const m=root.getAttribute('data-mode')==='dark'?'light':'dark';
  root.setAttribute('data-mode',m);localStorage.setItem('mode',m);
  document.getElementById('modeBtn').textContent=m==='dark'?'☀️':'🌙';
};

/* ── Toast ── */
let tt;
window.showToast=function(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);
};

/* ── Tabs ── */
window.showTab=function(i){
  document.querySelectorAll('.cpanel').forEach((p,k)=>p.classList.toggle('show',k===i));
  document.querySelectorAll('.ctab').forEach((b,k)=>b.classList.toggle('active',k===i));
};

/* ── Load Subject ── */
async function loadSubject(){
  if(!subjectId){ location.href='index_academy.html'; return; }
  try{
    const snap=await getDoc(doc(db,'subjects',subjectId));
    if(!snap.exists()){ location.href='index_academy.html'; return; }
    const s={id:snap.id,...snap.data()};
    document.title=esc(s.title)+' · منصة مستر مصطفى';
    document.getElementById('subjBigIcon').textContent=s.icon||'📚';
    document.getElementById('subjHeroTitle').textContent=s.title||'';
    document.getElementById('subjHeroDesc').textContent=s.desc||s.description||'';
    document.getElementById('breadSubj').textContent=s.title||'';
    const catMap={arabic:'🖊️ عربي',english:'🇬🇧 إنجليزي',math:'🔢 رياضيات',science:'🔬 علوم',other:'📦 أخرى'};
    document.getElementById('subjHeroMeta').innerHTML=`
      <div class="meta-chip">${catMap[s.category]||s.category||'عام'}</div>
      <div class="meta-chip">📖 ${s.lessonsCount||0} درس</div>
      <div class="meta-chip">📕 ${s.storiesCount||0} قصة</div>
      <div class="meta-chip teacher-chip">👨‍🏫 ${esc(s.teacherName||'المعلم')}</div>`;
    loadLessons();
    loadQuizzes();
  }catch(e){ showToast('⚠️ '+e.message); }
}

/* ── Load Lessons ── */
async function loadLessons(){
  try{
    const snap=await getDocs(query(collection(db,'lessons'),where('subjectId','==',subjectId)));
    const all=[]; snap.forEach(d=>all.push({id:d.id,...d.data()}));
    const typeLabel={lesson:'📖 درس',video:'🎬 فيديو',story:'📕 قصة',exercise:'✏️ تمرين'};

    const lessons=all.filter(r=>r.type==='lesson'||r.type==='exercise'||!r.type);
    const videos=all.filter(r=>r.type==='video');
    const stories=all.filter(r=>r.type==='story');

    renderLessonCards('lessonsGrid', lessons.length?lessons:[], '📖', 'لا توجد دروس في هذه المادة بعد');
    renderLessonCards('videosGrid', videos, '🎬', 'لا توجد فيديوهات بعد');
    renderLessonCards('storiesGrid', stories, '📕', 'لا توجد قصص بعد');

    // update tab counts
    document.getElementById('ct0').textContent=`📖 الدروس (${lessons.length})`;
    document.getElementById('ct1').textContent=`🎬 الفيديوهات (${videos.length})`;
    document.getElementById('ct2').textContent=`📕 القصص (${stories.length})`;
  }catch(e){ showToast('⚠️ '+e.message); }
}

function renderLessonCards(gridId, items, emptyIcon, emptyMsg){
  const grid=document.getElementById(gridId);
  if(!items.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">${emptyIcon}</div><div class="empty-text">${emptyMsg}</div></div>`;
    return;
  }
  const typeLabel={lesson:'📖 درس',video:'🎬 فيديو',story:'📕 قصة',exercise:'✏️ تمرين'};
  grid.innerHTML=items.map(r=>`
    <div class="lesson-card">
      <div class="lcard-type">${typeLabel[r.type]||r.type||'درس'}</div>
      <div class="lcard-top">
        <div class="lcard-icon">${r.icon||'📖'}</div>
        <div>
          <div class="lcard-title">${esc(r.title)}</div>
          ${r.desc?`<div class="lcard-desc">${esc(r.desc)}</div>`:''}
        </div>
      </div>
      ${r.videoUrl?`<div class="lcard-video"><a href="${esc(r.videoUrl)}" target="_blank" rel="noopener">▶️ مشاهدة الفيديو</a></div>`:''}
    </div>`).join('');
}

/* ── Load Quizzes ── */
async function loadQuizzes(){
  const list=document.getElementById('quizList');
  try{
    const snap=await getDocs(query(collection(db,'quizzes'),where('subjectId','==',subjectId)));
    document.getElementById('ct3').textContent=`❓ الاختبارات (${snap.size})`;
    if(snap.empty){
      list.innerHTML='<div class="empty"><div class="empty-icon">❓</div><div class="empty-text">لا توجد اختبارات بعد في هذه المادة</div></div>';
      return;
    }
    const rows=[]; snap.forEach(d=>rows.push({id:d.id,...d.data()}));
    list.innerHTML=rows.map(r=>`
      <div class="quiz-card" onclick="startQuiz('${r.id}')">
        <div class="quiz-card-title">❓ ${esc(r.title)}</div>
        <div class="quiz-card-meta">${(r.questions||[]).length} سؤال</div>
        <button class="start-quiz-btn">🚀 ابدأ الاختبار الآن</button>
      </div>`).join('');
    window._quizData={};
    rows.forEach(r=>{ window._quizData[r.id]=r; });
  }catch(e){ list.innerHTML='<div class="empty">⚠️ '+esc(e.message)+'</div>'; }
}

/* ── Quiz Engine ── */
window.startQuiz=function(id){
  const q=window._quizData&&window._quizData[id];
  if(!q||!q.questions||!q.questions.length){ showToast('⚠️ لا توجد أسئلة في هذا الاختبار'); return; }
  currentQuiz=q; quizIdx=0; quizScore=0;
  document.getElementById('quizModal').classList.add('show');
  renderQuizQ();
};

function renderQuizQ(){
  const box=document.getElementById('quizBox');
  if(quizIdx>=currentQuiz.questions.length){
    const pct=Math.round(quizScore/currentQuiz.questions.length*100);
    box.innerHTML=`<div class="quiz-result">
      <div class="quiz-result-icon">${pct>=80?'🏆':pct>=60?'⭐':'📚'}</div>
      <div class="quiz-result-title">${pct>=80?'ممتاز!':pct>=60?'جيد!':'حاول مجدداً!'}</div>
      <div class="quiz-result-score">${quizScore} من ${currentQuiz.questions.length} صحيحة · ${pct}%</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="quiz-close" onclick="document.getElementById('quizModal').classList.remove('show')">إغلاق</button>
        <button class="quiz-close" style="background:var(--teal);" onclick="startQuiz(currentQuiz.id)">🔄 إعادة</button>
      </div>
    </div>`; return;
  }
  const q=currentQuiz.questions[quizIdx];
  const shuffled=[...(q.choices||[q.ans])].sort(()=>Math.random()-.5);
  const pct=Math.round(quizIdx/currentQuiz.questions.length*100);
  box.innerHTML=`
    <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-q-num">سؤال ${quizIdx+1} من ${currentQuiz.questions.length}</div>
    <div class="quiz-q-txt">${esc(q.q)}</div>
    <div class="quiz-choices">
      ${shuffled.map(c=>`<button class="qc" onclick="checkAns(this,'${esc(c)}','${esc(q.ans)}')">${esc(c)}</button>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfb"></div>`;
}

window.checkAns=function(btn,chosen,correct){
  document.querySelectorAll('.qc').forEach(b=>{
    b.classList.add('answered');
    if(b.textContent.trim()===correct) b.classList.add('correct');
  });
  const fb=document.getElementById('qfb');
  if(chosen===correct){
    btn.classList.add('correct'); quizScore++;
    fb.textContent='✅ إجابة صحيحة!'; fb.style.color='var(--teal)';
  }else{
    btn.classList.add('wrong');
    fb.textContent='❌ الإجابة الصحيحة: '+correct; fb.style.color='var(--rose)';
  }
  setTimeout(()=>{ quizIdx++; renderQuizQ(); }, 1500);
};

/* ── Live Broadcast ── */
async function checkLive(){
  try{
    const snap=await getDoc(doc(db,'broadcasts','live'));
    if(snap.exists()&&snap.data().active){
      const b=snap.data();
      const pMap={meet:'🎥',facebook:'📘',youtube:'▶️',telegram:'✈️',zoom:'💻'};
      document.getElementById('livePlatIcon').textContent=pMap[b.platform]||'🔴';
      document.getElementById('liveTitleTxt').textContent=b.title||'بثّ مباشر';
      liveLink=b.link||'';
      document.getElementById('liveBanner').classList.add('show');
    }
  }catch(e){}
}
window.joinLive=function(){ if(liveLink) window.open(liveLink,'_blank','noopener'); };

/* ── Announcements ── */
async function loadAnnouncements(){
  const wrap=document.getElementById('annWrap');
  try{
    const snap=await getDocs(collection(db,'announcements'));
    const now=new Date();
    const items=[];
    snap.forEach(d=>{
      const a={id:d.id,...d.data()};
      const exp=a.expiresAt?.toDate?a.expiresAt.toDate():new Date(a.expiresAt?.seconds*1000||0);
      if(exp>now) items.push(a);
    });
    if(!items.length){ wrap.innerHTML=''; return; }
    const cls={info:'ann-info',success:'ann-success',warning:'ann-warning'};
    const ico={info:'ℹ️',success:'🎉',warning:'⚠️'};
    wrap.innerHTML=items.slice(0,3).map(a=>`
      <div class="ann-item ${cls[a.type]||'ann-info'}">${ico[a.type]||'ℹ️'} ${esc(a.text)}</div>`).join('');
  }catch(e){}
}

/* ── Init ── */
const root2=document.documentElement;
if(localStorage.getItem('mode')) root2.setAttribute('data-mode',localStorage.getItem('mode'));
loadSubject();
checkLive();
loadAnnouncements();
setInterval(checkLive, 30000);
</script>
